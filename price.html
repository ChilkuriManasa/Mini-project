        <button onclick="clearCart()">Clear Cart</button>

    <div class="wishlist-container" id="wishlist-container">

        <ul id="wishlist-items">
            <!-- Wishlist items will be displayed here -->

        <button onclick="clearWishlist()">Clear Wishlist</button>

    <footer>
        <p>Powered by Price Compare</p>

            const filteredResults = demoProducts.filter(product => 
                product.name.toLowerCase().includes(searchQuery.toLowerCase())
            );

            // Display the filtered results
            const resultsContainer = document.getElementById('results');
            resultsContainer.innerHTML = "";  // Clear previous results

            filteredResults.forEach(product => {
                const productElement = document.createElement('div');
                productElement.classList.add('result-card');
                productElement.innerHTML = `
                    <h3>${product.name}</h3>
                    <p>Price: ${product.price}</p>
                    <p>Store: ${product.store}</p>
                    <a href="${product.url}" target="_blank">
                        <button>Buy Now</button>
                    </a>
                    <button onclick="addToCart('${product.name}', '${product.price}')">Add to Cart</button>
                    <button onclick="addToWishlist('${product.name}', '${product.price}')" style="background-color: #e74c3c;">Add to Wishlist</button>
                `;
                resultsContainer.appendChild(productElement);
            });
        }

        // Add item to the cart
        function addToCart(name, price) {
            const item = { name, price };
            cart.push(item);
            updateCartIcon();
            updateCartDisplay();
        }

        // Update cart icon count
        function updateCartIcon() {
            const cartIcon = document.getElementById('cart-icon');
            cartIcon.setAttribute('data-count', cart.length);
        }

        // Toggle cart visibility
        function toggleCart() {
            const cartContainer = document.getElementById('cart-container');
            cartContainer.style.display = cartContainer.style.display === 'block' ? 'none' : 'block';
        }

        // Update cart display
        function updateCartDisplay() {
            const cartItemsContainer = document.getElementById('cart-items');
            cartItemsContainer.innerHTML = "";  // Clear previous cart items

            cart.forEach(item => {
                const li = document.createElement('li');
                li.innerText = `${item.name} - ${item.price}`;

                cartItemsContainer.appendChild(li);
            });
        }

        // Clear cart
        function clearCart() {
            cart = [];
            updateCartIcon();
            updateCartDisplay();
            toggleCart(); // Close the cart after clearing
        }

        // Wishlist Functions
        function addToWishlist(name, price) {
            const item = { name, price };
            if (!wishlist.some(i => i.name === name)) {
                wishlist.push(item);
                updateWishlistIcon();
                updateWishlistDisplay();
            }
        }

        function updateWishlistIcon() {
            const wishlistIcon = document.getElementById('wishlist-icon');
            wishlistIcon.setAttribute('data-count', wishlist.length);
        }

        function toggleWishlist() {
            const wishlistContainer = document.getElementById('wishlist-container');
            wishlistContainer.style.display = wishlistContainer.style.display === 'block' ? 'none' : 'block';
        }

        function updateWishlistDisplay() {
            const wishlistItemsContainer = document.getElementById('wishlist-items');
            wishlistItemsContainer.innerHTML = "";

            wishlist.forEach(item => {
                const li = document.createElement('li');
                li.innerHTML = `
                    ${item.name} - ${item.price}
                    <button onclick="moveToCart('${item.name}', '${item.price}')">Move to Cart</button>
                `;
                wishlistItemsContainer.appendChild(li);
            });
        }

        function clearWishlist() {
            wishlist = [];
            updateWishlistIcon();
            updateWishlistDisplay();
            toggleWishlist();
        }

        function moveToCart(name, price) {
            addToCart(name, price);
            wishlist = wishlist.filter(item => item.name !== name);
            updateWishlistIcon();
            updateWishlistDisplay();
        }

        // User Functions
        function checkLogin() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }
            document.getElementById('userName').textContent = `Welcome, ${currentUser.name}!`;

        }

        function handleLogout() {
            localStorage.removeItem('currentUser');
            cart = [];
            wishlist = [];
            updateCartIcon();
            updateWishlistIcon();
            window.location.href = 'login.html';
        }

        // Initialize on page load
        window.onload = function() {
            checkLogin();
            updateCartIcon();
            updateWishlistIcon();
        };
    </script>
