<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(to bottom right, #2c3e50, #3498db, #2ecc71);
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            width: 350px;
            position: relative;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .form-container {
            display: none;
        }

        .form-container.active {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        input:focus {
            border-color: #2ecc71;
            outline: none;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.3);
            background: rgba(255, 255, 255, 0.2);
        }

        label {
            font-size: 14px;
            color: white;
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.2);
        }

        button:hover {
            background: #27ae60;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .switch-form {
            text-align: center;
            margin-top: 25px;
        }

        .switch-form a, .forgot-password a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .switch-form a:hover, .forgot-password a:hover {
            color: #2ecc71;
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 20px;
        }

        .success-message {
            color: #2ecc71;
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid #2ecc71;
        }

        .error-message {
            color: #e74c3c;
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid #e74c3c;
        }

        .success-message, .error-message {
            text-align: center;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
            backdrop-filter: blur(5px);
            display: none;
        }

        /* Glowing effect */
        .container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #2ecc71, #3498db, #2c3e50);
            z-index: -1;
            border-radius: 17px;
            filter: blur(10px);
            opacity: 0.5;
        }

        /* Responsive text color */
        .switch-form span {
            color: rgba(255, 255, 255, 0.8);
        }

        /* Additional green theme elements */
        .input-group .icon {
            position: absolute;
            right: 12px;
            top: 40px;
            color: #2ecc71;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Form -->
        <div class="form-container active" id="loginForm">
            <h2>Login</h2>
            <div class="error-message" id="loginError"></div>
            <form onsubmit="return handleLogin(event)">
                <div class="input-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="input-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <div class="forgot-password">
                    <a href="#" onclick="showResetPassword()">Forgot Password?</a>
                </div>
                <button type="submit">Login</button>
                <div class="switch-form">
                    <span>Don't have an account? </span>
                    <a href="#" onclick="switchForm('signupForm')">Sign Up</a>
                </div>
            </form>
        </div>

        <!-- Signup Form -->
        <div class="form-container" id="signupForm">
            <h2>Create Account</h2>
            <div class="success-message" id="signupSuccess"></div>
            <div class="error-message" id="signupError"></div>
            <form onsubmit="return handleSignup(event)">
                <div class="input-group">
                    <label for="signupName">Full Name</label>
                    <input type="text" id="signupName" required>
                </div>
                <div class="input-group">
                    <label for="signupEmail">Email</label>
                    <input type="email" id="signupEmail" required>
                </div>
                <div class="input-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" required>
                </div>
                <div class="input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" required>
                </div>
                <button type="submit">Sign Up</button>
                <div class="switch-form">
                    <span>Already have an account? </span>
                    <a href="#" onclick="switchForm('loginForm')">Login</a>
                </div>
            </form>
        </div>

        <!-- Reset Password Form -->
        <div class="form-container" id="resetForm">
            <h2>Reset Password</h2>
            <div class="success-message" id="resetSuccess"></div>
            <div class="error-message" id="resetError"></div>
            <form onsubmit="return handleReset(event)">
                <div class="input-group">
                    <label for="resetEmail">Email</label>
                    <input type="email" id="resetEmail" required>
                </div>
                <button type="submit">Reset Password</button>
                <div class="switch-form">
                    <a href="#" onclick="switchForm('loginForm')">Back to Login</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Store user data (In a real application, this would be handled by a backend)
        let users = JSON.parse(localStorage.getItem('users')) || [];

        function switchForm(formId) {
            document.querySelectorAll('.form-container').forEach(form => {
                form.classList.remove('active');
            });
            document.getElementById(formId).classList.add('active');
            clearMessages();
        }

        function showResetPassword() {
            switchForm('resetForm');
        }

        function clearMessages() {
            document.querySelectorAll('.success-message, .error-message').forEach(msg => {
                msg.style.display = 'none';
                msg.textContent = '';
            });
        }

        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                // Store logged in user
                localStorage.setItem('currentUser', JSON.stringify(user));
                // Redirect to price.html
                window.location.href = 'price.html';
            } else {
                const errorDiv = document.getElementById('loginError');
                errorDiv.textContent = 'Invalid email or password';
                errorDiv.style.display = 'block';
            }
            return false;
        }

        function handleSignup(event) {
            event.preventDefault();
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                const errorDiv = document.getElementById('signupError');
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.style.display = 'block';
                return false;
            }

            if (users.some(u => u.email === email)) {
                const errorDiv = document.getElementById('signupError');
                errorDiv.textContent = 'Email already registered';
                errorDiv.style.display = 'block';
                return false;
            }

            users.push({ name, email, password });
            localStorage.setItem('users', JSON.stringify(users));

            const successDiv = document.getElementById('signupSuccess');
            successDiv.textContent = 'Account created successfully! Please login.';
            successDiv.style.display = 'block';

            // Clear form
            event.target.reset();
            
            // Switch to login form after 2 seconds
            setTimeout(() => switchForm('loginForm'), 2000);
            return false;
        }

        function handleReset(event) {
            event.preventDefault();
            const email = document.getElementById('resetEmail').value;

            const user = users.find(u => u.email === email);
            if (user) {
                const successDiv = document.getElementById('resetSuccess');
                successDiv.textContent = 'Password reset link sent to your email';
                successDiv.style.display = 'block';
            } else {
                const errorDiv = document.getElementById('resetError');
                errorDiv.textContent = 'Email not found';
                errorDiv.style.display = 'block';
            }
            return false;
        }
    </script>
</body>
</html>
